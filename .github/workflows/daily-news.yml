name: Stock Market Daily

on:
  schedule:
    # 夏令时（3月~11月）：06:00 蒙特利尔 EDT = 10:00 UTC
    # 冬令时（11月~3月）：06:00 蒙特利尔 EST = 11:00 UTC → 改为 '0 11 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq feedparser requests
      - name: Generate stock news page
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python scripts/fetch_news.py
      - name: Commit and push
        run: |
          git config user.name "Stock News Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "📈 股市分析日报 $(date +%Y-%m-%d)"
          git push

  retry-on-failure:
    runs-on: ubuntu-latest
    needs: generate
    if: failure()
    timeout-minutes: 15
    steps:
      - run: sleep 300
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq feedparser requests
      - name: Retry generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python scripts/fetch_news.py
      - name: Commit and push
        run: |
          git config user.name "Stock News Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "📈 股市分析日报 $(date +%Y-%m-%d)（重试）"
          git push
